[build]
  publish = "."
  functions = "netlify/functions"

# ── Security Headers (ทุก route) ──
[[headers]]
  for = "/*"
  [headers.values]
    # ป้องกัน XSS — connect-src ต้องรวม 'self' (สำหรับ /.netlify/functions/*) และ fonts
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://cdn.jsdelivr.net; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; media-src 'self' blob:; worker-src blob:; frame-ancestors 'none';"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "geolocation=(), microphone=(), payment=()"

# ── Function config ──
[functions]
  node_bundler = "esbuild"

[functions."ocr"]
  timeout = 30
